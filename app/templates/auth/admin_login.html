{% extends 'base.html' %}
{% block title %}Admin Login — TaskHub{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm p-4 mt-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock-fill fs-1 text-danger"></i>
        <h3 class="fw-bold mt-2">Admin Login</h3>
        <p class="text-muted">Restricted access only</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Admin Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter admin ID" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold">
          <i class="bi bi-shield-lock me-2"></i>Login as Admin
        </button>
      </form>
      <p class="text-center mt-3 text-muted small">
        Not an admin? <a href="{{ url_for('auth.login') }}">Sign in with Google</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
