<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Admin — TaskHub{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root { --primary: #6C63FF; --primary-dark: #574fd6; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
    .sidebar { width: 240px; min-height: 100vh; background: #1a1a2e; position: fixed; top: 0; left: 0; z-index: 100; }
    .sidebar-brand { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-brand a { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.2rem; }
    .sidebar-nav { padding: 1rem 0; }
    .sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; transition: all 0.2s; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(108,99,255,0.3); color: #fff; }
    .sidebar-nav a i { font-size: 1.1rem; }
    .main-content { margin-left: 240px; padding: 2rem; }
    .stat-card { background: #fff; border-radius: 12px; padding: 1.5rem; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .status-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-paid { background: #cff4fc; color: #055160; }
    .status-in_progress { background: #d1ecf1; color: #0c5460; }
    .status-delivered { background: #d4edda; color: #155724; }
    .status-completed { background: #d4edda; color: #155724; }
    .status-disputed { background: #f8d7da; color: #721c24; }
    .status-cancelled { background: #e2e3e5; color: #383d41; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <a href="{{ url_for('admin.dashboard') }}">
      <i class="bi bi-lightning-charge-fill text-primary me-2"></i>TaskHub Admin
    </a>
  </div>
  <div class="sidebar-nav">
    <a href="{{ url_for('admin.dashboard') }}" class="{{ 'active' if request.endpoint == 'admin.dashboard' }}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="{{ url_for('admin.users') }}" class="{{ 'active' if request.endpoint == 'admin.users' }}">
      <i class="bi bi-people"></i> Users
    </a>
    <a href="{{ url_for('admin.gigs') }}" class="{{ 'active' if request.endpoint == 'admin.gigs' }}">
      <i class="bi bi-grid"></i> Gigs
    </a>
    <a href="{{ url_for('admin.orders') }}" class="{{ 'active' if request.endpoint == 'admin.orders' }}">
      <i class="bi bi-bag"></i> Orders
    </a>
    <a href="{{ url_for('admin.disputes') }}" class="{{ 'active' if request.endpoint == 'admin.disputes' }}">
      <i class="bi bi-flag"></i> Disputes
    </a>
    <a href="{{ url_for('admin.reports') }}" class="{{ 'active' if request.endpoint == 'admin.reports' }}">
      <i class="bi bi-exclamation-triangle"></i> Reports
    </a>
    <a href="{{ url_for('admin.categories') }}" class="{{ 'active' if request.endpoint == 'admin.categories' }}">
      <i class="bi bi-tags"></i> Categories
    </a>
    <hr style="border-color:rgba(255,255,255,0.1); margin: 0.5rem 1rem;">
    <a href="{{ url_for('gigs.home') }}">
      <i class="bi bi-box-arrow-left"></i> Back to Site
    </a>
  </div>
</div>

<div class="main-content">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ 'danger' if cat == 'danger' else 'success' if cat == 'success' else 'warning' if cat == 'warning' else 'info' }} alert-dismissible fade show">
      {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
